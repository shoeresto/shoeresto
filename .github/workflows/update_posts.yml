name: Update Portfolio Posts

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  # GitHub Actions Node 20 EOL 경고 우회 및 호환성 유지
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare environment and Install dependencies
        run: |
          mkdir -p data # data 폴더가 없으면 에러가 나므로 강제 생성
          npm install node-fetch dotenv

      - name: Run build script
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_ID: ${{ secrets.IG_ID }}
        run: node scripts/build.js # 실행 경로를 scripts 폴더 내부로 변경

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/posts.json
          git commit -m "Update portfolio posts [skip ci]" || echo "No changes to commit"
          git push
